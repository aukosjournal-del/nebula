<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="100" fill="#0a0e1a"/>
  <!-- Lumi comet body (head) -->
  <circle cx="320" cy="256" r="70" fill="white" opacity="0.95"/>
  <!-- Lumi tail -->
  <ellipse cx="180" cy="256" rx="120" ry="35" fill="url(#tail)" opacity="0.7"/>
  <!-- Lumi eyes -->
  <rect x="300" y="238" width="16" height="22" rx="6" fill="#0a0e1a"/>
  <rect x="330" y="238" width="16" height="22" rx="6" fill="#0a0e1a"/>
  <!-- Glow ring -->
  <circle cx="320" cy="256" r="85" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.3"/>
  <defs>
    <linearGradient id="tail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
</svg>
