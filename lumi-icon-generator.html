<!DOCTYPE html>
<!--
    NEBULA LUMI ICON GENERATOR
    Algorithmic Art Implementation: Celestial Navigation
    Generates unique variations of Lumi (the comet mascot) using seeded randomness
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Lumi Icon Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* Anthropic Brand Colors */
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        /* Control Sections */
        .control-section {
            margin-bottom: 32px;
        }

        .control-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '•';
            color: var(--anthropic-orange);
            font-weight: bold;
        }

        /* Seed Controls */
        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .regen-button {
            margin-bottom: 0;
        }

        /* Parameter Controls */
        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #c86641;
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 60px;
            text-align: right;
        }

        /* Color Pickers */
        .color-group {
            margin-bottom: 16px;
        }

        .color-group label {
            display: block;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 4px;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-picker-container input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
        }

        /* Buttons */
        .button {
            background: var(--anthropic-orange);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .button:hover {
            background: #c86641;
            transform: translateY(-1px);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.secondary {
            background: var(--anthropic-blue);
        }

        .button.secondary:hover {
            background: #5a8bb8;
        }

        .button.tertiary {
            background: var(--anthropic-green);
        }

        .button.tertiary:hover {
            background: #6b7b52;
        }

        .button-row {
            display: flex;
            gap: 8px;
        }

        .button-row .button {
            flex: 1;
        }

        /* Canvas Area */
        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 1000px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1);
            background: white;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        /* Loading State */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--anthropic-mid-gray);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .canvas-area {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Control Sidebar -->
        <div class="sidebar">
            <h1>Lumi Icon</h1>
            <div class="subtitle">Nebula mascot generative variations</div>

            <!-- Seed Section -->
            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="12345" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <!-- Parameters Section -->
            <div class="control-section">
                <h3>Parameters</h3>

                <!-- Comet Size -->
                <div class="control-group">
                    <label>Comet Core Size</label>
                    <div class="slider-container">
                        <input type="range" id="cometSize" min="40" max="150" step="5" value="100" oninput="updateParam('cometSize', this.value)">
                        <span class="value-display" id="cometSize-value">100</span>
                    </div>
                </div>

                <!-- Tail Length -->
                <div class="control-group">
                    <label>Tail Length</label>
                    <div class="slider-container">
                        <input type="range" id="tailLength" min="80" max="350" step="20" value="240" oninput="updateParam('tailLength', this.value)">
                        <span class="value-display" id="tailLength-value">240</span>
                    </div>
                </div>

                <!-- Eye Intensity -->
                <div class="control-group">
                    <label>Eye Intensity</label>
                    <div class="slider-container">
                        <input type="range" id="eyeIntensity" min="0.3" max="1.0" step="0.1" value="0.9" oninput="updateParam('eyeIntensity', this.value)">
                        <span class="value-display" id="eyeIntensity-value">0.9</span>
                    </div>
                </div>

                <!-- Glow Intensity -->
                <div class="control-group">
                    <label>Glow Intensity</label>
                    <div class="slider-container">
                        <input type="range" id="glowIntensity" min="0.5" max="2.0" step="0.1" value="1.5" oninput="updateParam('glowIntensity', this.value)">
                        <span class="value-display" id="glowIntensity-value">1.5</span>
                    </div>
                </div>

                <!-- Tail Fluidness -->
                <div class="control-group">
                    <label>Tail Fluidness</label>
                    <div class="slider-container">
                        <input type="range" id="tailFluidness" min="0.3" max="1.0" step="0.1" value="0.75" oninput="updateParam('tailFluidness', this.value)">
                        <span class="value-display" id="tailFluidness-value">0.75</span>
                    </div>
                </div>
            </div>

            <!-- Colors Section -->
            <div class="control-section">
                <h3>Colors</h3>

                <!-- Core Color (Cyan) -->
                <div class="color-group">
                    <label>Core (Cyan)</label>
                    <div class="color-picker-container">
                        <input type="color" id="colorCore" value="#00D9FF" onchange="updateColor('colorCore', this.value)">
                        <span class="color-value" id="colorCore-value">#00D9FF</span>
                    </div>
                </div>

                <!-- Glow Color (Purple) -->
                <div class="color-group">
                    <label>Glow (Purple)</label>
                    <div class="color-picker-container">
                        <input type="color" id="colorGlow" value="#D946EF" onchange="updateColor('colorGlow', this.value)">
                        <span class="color-value" id="colorGlow-value">#D946EF</span>
                    </div>
                </div>

                <!-- Background Color -->
                <div class="color-group">
                    <label>Background</label>
                    <div class="color-picker-container">
                        <input type="color" id="colorBg" value="#0F0F2E" onchange="updateColor('colorBg', this.value)">
                        <span class="color-value" id="colorBg-value">#0F0F2E</span>
                    </div>
                </div>
            </div>

            <!-- Actions Section -->
            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                </div>
            </div>
        </div>

        <!-- Main Canvas Area -->
        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Generating Lumi...</div>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════════════
        // NEBULA LUMI ICON GENERATOR - PARAMETERS
        // ═══════════════════════════════════════════════════════════════════════

        let params = {
            seed: 12345,
            cometSize: 100,
            tailLength: 240,
            eyeIntensity: 0.9,
            glowIntensity: 1.5,
            tailFluidness: 0.75,
            colorCore: '#00D9FF',
            colorGlow: '#D946EF',
            colorBg: '#0F0F2E'
        };

        let defaultParams = {...params};

        // ═══════════════════════════════════════════════════════════════════════
        // P5.JS GENERATIVE ART ALGORITHM - NEBULA LUMI
        // ═══════════════════════════════════════════════════════════════════════

        let tailParticles = [];
        const CENTER_X = 600;
        const CENTER_Y = 600;

        function setup() {
            let canvas = createCanvas(1200, 1200);
            canvas.parent('canvas-container');
            noLoop(); // Static image

            initializeSystem();
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);

            tailParticles = [];

            // Generate tail particles - use noise for organic shape
            let noiseOffsetX = random(1000);
            let noiseOffsetY = random(1000);

            for (let i = 0; i < params.tailLength; i++) {
                let t = i / params.tailLength;
                let distance = i * 1.2; // Distance from core

                // Noise-driven divergence
                let angle = atan2(1, 1) - 0.4; // Pointing backward
                let noiseVal = noise(
                    noiseOffsetX + t * params.tailFluidness * 0.5,
                    noiseOffsetY + sin(t * PI) * 0.3
                );

                angle += (noiseVal - 0.5) * 0.8; // Perturbation

                let x = CENTER_X - distance * cos(angle);
                let y = CENTER_Y - distance * sin(angle);

                // Particle properties
                tailParticles.push({
                    x: x,
                    y: y,
                    size: 3 + (1 - t) * 8, // Fade from large to small
                    alpha: (1 - t) * 0.8, // Fade tail
                    brightness: noiseVal
                });
            }

            redraw();
            document.querySelector('.loading').style.display = 'none';
        }

        function drawFrame() {
            // Dark cosmic background with stars
            let bgColor = hexToRgb(params.colorBg);
            background(bgColor.r, bgColor.g, bgColor.b);

            // Draw stars in background
            drawStars();

            // Draw comet in minimalist line style
            drawCometMinimal();
        }

        function drawStars() {
            noStroke();
            randomSeed(params.seed);

            for (let i = 0; i < 100; i++) {
                let x = random(width);
                let y = random(height);
                let size = random(1, 4);
                let opacity = random(100, 200);

                fill(255, 255, 255, opacity);
                ellipse(x, y, size, size);
            }
        }

        function drawCometMinimal() {
            let bgColor = hexToRgb(params.colorBg);

            let cx = CENTER_X;
            let cy = CENTER_Y - 100;
            let R  = 285;

            // ── BROKEN CIRCLE ─────────────────────────────────────────────
            // Gap ~2h (upper-right 325°→355°) and ~8h (lower-left 145°→175°)
            stroke(255, 255, 255);
            strokeWeight(6);
            noFill();
            strokeCap(SQUARE);
            arc(cx, cy, R*2, R*2, radians(-5), radians(143));
            arc(cx, cy, R*2, R*2, radians(175), radians(325));

            // ── COMET HEAD ────────────────────────────────────────────────
            // Head at 10 o'clock (210° screen), 45% of radius
            let headDist  = R * 0.43;
            let headAngle = radians(210); // 10 o'clock
            let hx = cx + headDist * cos(headAngle); // ≈ 494
            let hy = cy + headDist * sin(headAngle); // ≈ 439

            // Oval rotated -60° so: local "up" → 10 o'clock, local "down" → 4 o'clock
            let rx = 18, ry = 28;
            push();
            translate(hx, hy);
            rotate(-PI / 3); // -60°

            noStroke();
            fill(255, 255, 255);
            ellipse(0, 0, rx*2, ry*2);

            // Eye in upper portion of oval (local up → screen upper-left)
            fill(bgColor.r, bgColor.g, bgColor.b);
            circle(0, -ry * 0.45, 12);
            pop();

            // ── TAIL LINES ────────────────────────────────────────────────
            // Travel direction: 30° (= 4 o'clock, lower-right-ish)
            // Perpendicular: 120°
            stroke(255, 255, 255);
            strokeWeight(4);
            strokeCap(ROUND);
            noFill();

            let td = radians(30);
            let pd = radians(120);

            // Tail emerges from oval's "bottom" tip (lower-right in screen)
            // local "down" (0, ry) after rotate(-PI/3) → (sin(60°)*ry, cos(60°)*ry) = (0.866ry, 0.5ry)
            let tsx = hx + 0.866 * ry;
            let tsy = hy + 0.5   * ry;

            let tLen    = 235;
            let spreads = [-58, -19, +19, +58];

            for (let s of spreads) {
                let ex = tsx + tLen * cos(td) + s * cos(pd);
                let ey = tsy + tLen * sin(td) + s * sin(pd);
                line(tsx, tsy, ex, ey);
            }

            // ── NEBULA TEXT ───────────────────────────────────────────────
            push();
            fill(255, 255, 255);
            noStroke();
            textAlign(CENTER, CENTER);
            textSize(100);
            let letters = 'NEBULA'.split('');
            let startX  = CENTER_X - (letters.length * 73) / 2 + 36;
            let textY   = CENTER_Y + 240;
            for (let i = 0; i < letters.length; i++) {
                text(letters[i], startX + i * 73, textY);
            }
            pop();
        }

        function drawCometCore() {
            let coreColor = hexToRgb(params.colorCore);
            let glowColor = hexToRgb(params.colorGlow);
            noStroke();

            // Glow layers - multiple concentric glowing circles
            for (let layer = 4; layer >= 1; layer--) {
                let size = params.cometSize + layer * 15;
                let alpha = 40 * params.glowIntensity * (5 - layer) / 4;

                fill(glowColor.r, glowColor.g, glowColor.b, alpha);
                ellipse(CENTER_X, CENTER_Y, size, size);
            }

            // Core bright sphere
            fill(coreColor.r, coreColor.g, coreColor.b, 255);
            ellipse(CENTER_X, CENTER_Y, params.cometSize, params.cometSize);

            // Inner bright core
            fill(255, 255, 255, 200);
            ellipse(CENTER_X, CENTER_Y, params.cometSize * 0.6, params.cometSize * 0.6);
        }

        function drawEyes() {
            let eyeRadius = params.cometSize * 0.2;
            let eyeDistance = params.cometSize * 0.35;

            // Randomize eye positions slightly based on seed
            let eyeOffsetY = params.cometSize * 0.15;

            // Left eye
            let eyeX1 = CENTER_X - eyeDistance;
            let eyeY = CENTER_Y - eyeOffsetY;

            drawEye(eyeX1, eyeY, eyeRadius);

            // Right eye
            let eyeX2 = CENTER_X + eyeDistance;
            drawEye(eyeX2, eyeY, eyeRadius);
        }

        function drawEye(x, y, radius) {
            let coreColor = hexToRgb(params.colorCore);
            noStroke();

            // Eye glow
            let glowIntensity = params.eyeIntensity;
            fill(coreColor.r, coreColor.g, coreColor.b, 100 * glowIntensity);
            ellipse(x, y, radius * 2.5, radius * 2.5);

            // Eye core
            fill(coreColor.r, coreColor.g, coreColor.b, 255);
            ellipse(x, y, radius * 1.5, radius * 1.5);

            // Eye shine
            fill(255, 255, 255, 220);
            ellipse(x - radius * 0.3, y - radius * 0.3, radius * 0.6, radius * 0.6);
        }

        function draw() {
            drawFrame();
        }

        // ═══════════════════════════════════════════════════════════════════════
        // UTILITY FUNCTIONS
        // ═══════════════════════════════════════════════════════════════════════

        function hexToRgb(hex) {
            let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 0, g: 217, b: 255 };
        }

        // ═══════════════════════════════════════════════════════════════════════
        // UI CONTROL HANDLERS
        // ═══════════════════════════════════════════════════════════════════════

        function updateParam(paramName, value) {
            params[paramName] = paramName.includes('Intensity') || paramName.includes('Fluidness')
                ? parseFloat(value)
                : parseInt(value);

            document.getElementById(paramName + '-value').textContent = value;
            initializeSystem();
            redraw();
        }

        function updateColor(colorId, value) {
            let paramName = colorId.replace('color', 'color');
            params[paramName] = value;
            document.getElementById(colorId + '-value').textContent = value;
            initializeSystem();
            redraw();
        }

        // ═══════════════════════════════════════════════════════════════════════
        // SEED CONTROL FUNCTIONS
        // ═══════════════════════════════════════════════════════════════════════

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
                redraw();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
            redraw();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
            redraw();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
            redraw();
        }

        function resetParameters() {
            params = {...defaultParams};

            // Update all sliders
            document.getElementById('cometSize').value = params.cometSize;
            document.getElementById('cometSize-value').textContent = params.cometSize;
            document.getElementById('tailLength').value = params.tailLength;
            document.getElementById('tailLength-value').textContent = params.tailLength;
            document.getElementById('eyeIntensity').value = params.eyeIntensity;
            document.getElementById('eyeIntensity-value').textContent = params.eyeIntensity;
            document.getElementById('glowIntensity').value = params.glowIntensity;
            document.getElementById('glowIntensity-value').textContent = params.glowIntensity;
            document.getElementById('tailFluidness').value = params.tailFluidness;
            document.getElementById('tailFluidness-value').textContent = params.tailFluidness;

            // Update all colors
            document.getElementById('colorCore').value = params.colorCore;
            document.getElementById('colorCore-value').textContent = params.colorCore;
            document.getElementById('colorGlow').value = params.colorGlow;
            document.getElementById('colorGlow-value').textContent = params.colorGlow;
            document.getElementById('colorBg').value = params.colorBg;
            document.getElementById('colorBg-value').textContent = params.colorBg;

            updateSeedDisplay();
            initializeSystem();
            redraw();
        }

        // Initialize on load
        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
